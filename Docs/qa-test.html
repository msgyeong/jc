<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JC 앱 QA 테스트 도구 v2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR','Segoe UI',sans-serif; background:#f0f2f5; color:#1a1a1a; line-height:1.6; }

/* Header */
.header { position:sticky; top:0; z-index:100; background:linear-gradient(135deg,#1F4FD8,#2563EB); color:#fff; padding:16px 24px; box-shadow:0 2px 12px rgba(0,0,0,.15); }
.header h1 { font-size:20px; font-weight:700; }
.header .subtitle { font-size:13px; opacity:.85; margin-top:2px; }
.header-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.header-actions button { padding:8px 16px; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
.btn-save { background:#F59E0B; color:#fff; }
.btn-save:hover { background:#D97706; }
.btn-export { background:#fff; color:#1F4FD8; }
.btn-export:hover { background:#EEF2FF; }
.btn-reset { background:rgba(255,255,255,.15); color:#fff; }
.btn-reset:hover { background:rgba(255,255,255,.25); }
.btn-collapse { background:rgba(255,255,255,.15); color:#fff; }

/* Progress */
.progress-bar { margin-top:12px; }
.progress-track { height:8px; background:rgba(255,255,255,.2); border-radius:4px; overflow:hidden; }
.progress-fill { height:100%; background:#34D399; border-radius:4px; transition:width .3s; }
.progress-text { font-size:12px; margin-top:4px; opacity:.9; }

/* Stats */
.stats-row { display:flex; gap:12px; padding:16px 24px; background:#fff; border-bottom:1px solid #e5e7eb; flex-wrap:wrap; }
.stat-card { flex:1; min-width:100px; text-align:center; padding:8px; background:#f8fafc; border-radius:8px; }
.stat-num { font-size:22px; font-weight:700; }
.stat-label { font-size:11px; color:#6b7280; }
.stat-total .stat-num { color:#1F4FD8; }
.stat-pass .stat-num { color:#059669; }
.stat-fail .stat-num { color:#DC2626; }
.stat-skip .stat-num { color:#9CA3AF; }
.stat-issue .stat-num { color:#F59E0B; }

/* Filter */
.filter-bar { padding:12px 24px; background:#fff; border-bottom:1px solid #e5e7eb; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.filter-bar select, .filter-bar input { padding:8px 12px; border:1px solid #d1d5db; border-radius:6px; font-size:13px; }
.filter-bar input { flex:1; min-width:200px; }
.filter-btn { padding:6px 14px; border:1px solid #d1d5db; border-radius:6px; background:#fff; cursor:pointer; font-size:12px; }
.filter-btn.active { background:#1F4FD8; color:#fff; border-color:#1F4FD8; }

/* Sections */
.container { max-width:1100px; margin:0 auto; padding:16px; }
.section { background:#fff; border-radius:12px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.08); overflow:hidden; }
.section-header { padding:16px 20px; background:#f8fafc; border-bottom:1px solid #e5e7eb; display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none; }
.section-header:hover { background:#f1f5f9; }
.section-title { font-size:16px; font-weight:700; display:flex; align-items:center; gap:8px; }
.section-icon { font-size:20px; }
.section-badge { font-size:11px; padding:2px 8px; border-radius:10px; background:#e5e7eb; color:#6b7280; }
.section-badge.has-fail { background:#FEE2E2; color:#DC2626; }
.section-toggle { font-size:18px; color:#9ca3af; transition:transform .2s; }
.section-toggle.collapsed { transform:rotate(-90deg); }
.section-body { padding:0; }
.section-body.collapsed { display:none; }

/* Test Item */
.test-item { border-bottom:1px solid #f3f4f6; padding:16px 20px; transition:background .15s; }
.test-item:last-child { border-bottom:none; }
.test-item:hover { background:#fafbfc; }
.test-item.status-pass { border-left:3px solid #059669; }
.test-item.status-fail { border-left:3px solid #DC2626; background:#FFF5F5; }
.test-item.status-skip { border-left:3px solid #D1D5DB; opacity:.7; }
.test-row { display:flex; align-items:flex-start; gap:12px; }
.test-number { font-size:11px; color:#9ca3af; font-weight:600; min-width:36px; padding-top:2px; }
.test-content { flex:1; }
.test-title { font-size:14px; font-weight:600; margin-bottom:2px; }
.test-steps { font-size:13px; color:#4b5563; margin:6px 0; padding-left:16px; }
.test-steps li { margin:3px 0; }
.test-expected { font-size:12px; color:#059669; background:#F0FDF4; padding:6px 10px; border-radius:6px; margin:6px 0; }
.test-pattern { font-size:12px; color:#7C3AED; background:#F5F3FF; padding:6px 10px; border-radius:6px; margin:6px 0; }
.test-pattern::before { content:"🔄 패턴 변형: "; font-weight:600; }
.test-actions { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.test-btn { padding:5px 12px; border:1px solid #d1d5db; border-radius:6px; font-size:12px; cursor:pointer; background:#fff; transition:all .15s; }
.test-btn:hover { background:#f3f4f6; }
.test-btn.btn-pass { color:#059669; border-color:#059669; }
.test-btn.btn-pass.active { background:#059669; color:#fff; }
.test-btn.btn-fail { color:#DC2626; border-color:#DC2626; }
.test-btn.btn-fail.active { background:#DC2626; color:#fff; }
.test-btn.btn-skip { color:#9CA3AF; }
.test-btn.btn-skip.active { background:#9CA3AF; color:#fff; }

/* Issue Area */
.issue-area { margin-top:10px; display:none; }
.issue-area.visible { display:block; }
.issue-textarea { width:100%; min-height:80px; padding:10px 12px; border:1px solid #FCA5A5; border-radius:8px; font-size:13px; resize:vertical; font-family:inherit; background:#FFF5F5; }
.issue-textarea:focus { outline:none; border-color:#DC2626; box-shadow:0 0 0 3px rgba(220,38,38,.1); }
.issue-severity { margin-top:6px; display:flex; gap:6px; align-items:center; }
.severity-btn { padding:4px 10px; border:1px solid #d1d5db; border-radius:4px; font-size:11px; cursor:pointer; background:#fff; }
.severity-btn.sev-critical.active { background:#DC2626; color:#fff; border-color:#DC2626; }
.severity-btn.sev-major.active { background:#F59E0B; color:#fff; border-color:#F59E0B; }
.severity-btn.sev-minor.active { background:#3B82F6; color:#fff; border-color:#3B82F6; }
.severity-btn.sev-cosmetic.active { background:#8B5CF6; color:#fff; border-color:#8B5CF6; }

/* Screenshot */
.screenshot-area { margin-top:8px; }
.screenshot-btn { display:inline-flex; align-items:center; gap:4px; padding:6px 12px; background:#f3f4f6; border:1px dashed #d1d5db; border-radius:6px; cursor:pointer; font-size:12px; color:#6b7280; }
.screenshot-btn:hover { background:#e5e7eb; }
.screenshot-preview { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.screenshot-thumb { position:relative; width:120px; height:80px; border-radius:6px; overflow:hidden; border:1px solid #e5e7eb; cursor:pointer; }
.screenshot-thumb img { width:100%; height:100%; object-fit:cover; }
.screenshot-remove { position:absolute; top:2px; right:2px; width:20px; height:20px; background:rgba(0,0,0,.6); color:#fff; border:none; border-radius:50%; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* Lightbox */
.lightbox { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.85); z-index:1000; align-items:center; justify-content:center; }
.lightbox.active { display:flex; }
.lightbox img { max-width:90%; max-height:90%; border-radius:8px; }
.lightbox-close { position:absolute; top:20px; right:20px; color:#fff; font-size:30px; cursor:pointer; background:none; border:none; }

/* Toast */
.toast { position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:8px; color:#fff; font-size:14px; font-weight:500; z-index:200; transform:translateY(80px); opacity:0; transition:all .3s; }
.toast.visible { transform:translateY(0); opacity:1; }
.toast.success { background:#059669; }
.toast.info { background:#2563EB; }
.toast.error { background:#DC2626; }

/* Summary Panel */
.summary-panel { background:#fff; border-radius:12px; padding:20px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
.summary-title { font-size:16px; font-weight:700; margin-bottom:12px; }
.issue-list-item { padding:8px 12px; margin:4px 0; border-radius:6px; font-size:13px; display:flex; gap:8px; align-items:flex-start; }
.issue-list-item.critical { background:#FEF2F2; border-left:3px solid #DC2626; }
.issue-list-item.major { background:#FFFBEB; border-left:3px solid #F59E0B; }
.issue-list-item.minor { background:#EFF6FF; border-left:3px solid #3B82F6; }
.issue-list-item.cosmetic { background:#F5F3FF; border-left:3px solid #8B5CF6; }

@media(max-width:768px){
  .header-actions { flex-direction:column; }
  .stats-row { flex-wrap:wrap; }
  .stat-card { min-width:80px; }
  .test-row { flex-direction:column; }
  .test-number { min-width:auto; }
}
</style>
</head>
<body>

<div class="header">
  <h1>JC 앱 QA 테스트 도구 v2</h1>
  <div class="subtitle">영등포 JC 회원관리 커뮤니티 앱 — 종합 품질 테스트</div>
  <div class="header-actions">
    <button class="btn-save" onclick="saveResults()">💾 저장 (JSON)</button>
    <button class="btn-export" onclick="exportMarkdown()">📋 마크다운 내보내기</button>
    <button class="btn-export" onclick="loadResults()">📂 이전 결과 불러오기</button>
    <button class="btn-collapse" onclick="toggleAllSections()">📁 전체 접기/펼치기</button>
    <button class="btn-reset" onclick="resetAll()">🔄 초기화</button>
  </div>
  <div class="progress-bar">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">테스트 진행률: 0%</div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card stat-total"><div class="stat-num" id="statTotal">0</div><div class="stat-label">전체</div></div>
  <div class="stat-card stat-pass"><div class="stat-num" id="statPass">0</div><div class="stat-label">통과</div></div>
  <div class="stat-card stat-fail"><div class="stat-num" id="statFail">0</div><div class="stat-label">실패</div></div>
  <div class="stat-card stat-skip"><div class="stat-num" id="statSkip">0</div><div class="stat-label">건너뜀</div></div>
  <div class="stat-card stat-issue"><div class="stat-num" id="statIssue">0</div><div class="stat-label">이슈</div></div>
</div>

<div class="filter-bar">
  <select id="filterSection" onchange="applyFilter()">
    <option value="all">전체 섹션</option>
  </select>
  <select id="filterStatus" onchange="applyFilter()">
    <option value="all">전체 상태</option>
    <option value="none">미테스트</option>
    <option value="pass">통과</option>
    <option value="fail">실패</option>
    <option value="skip">건너뜀</option>
  </select>
  <input type="text" id="filterSearch" placeholder="테스트 검색..." oninput="applyFilter()">
  <button class="filter-btn" onclick="showIssueSummary()">🐛 이슈 요약</button>
</div>

<div class="container" id="testContainer"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img id="lightboxImg" src="">
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// QA 테스트 시나리오 데이터 정의
// ═══════════════════════════════════════════════════

const TEST_DATA = [
// ──────────────────────────────────────────────────
// 1. 인증 & 로그인
// ──────────────────────────────────────────────────
{
  id: 'auth',
  icon: '🔐',
  title: '인증 & 로그인',
  tests: [
    {
      id: 'AUTH-001',
      title: '정상 로그인',
      steps: ['앱 접속 → 로그인 화면 확인', '이메일: admin@jc.com / 비밀번호: admin1234 입력', '로그인 버튼 클릭'],
      expected: '홈 화면으로 이동, 상단에 조직명 표시',
      pattern: '일반 회원 계정으로도 로그인 시도'
    },
    {
      id: 'AUTH-002',
      title: '잘못된 비밀번호 로그인',
      steps: ['이메일: admin@jc.com 입력', '비밀번호: wrongpassword 입력', '로그인 버튼 클릭'],
      expected: '에러 메시지 표시 (인라인), 홈으로 이동하지 않음',
      pattern: '5회 연속 실패 → 계정 잠금 또는 경고 확인'
    },
    {
      id: 'AUTH-003',
      title: '존재하지 않는 이메일 로그인',
      steps: ['이메일: nobody@test.com 입력', '아무 비밀번호 입력', '로그인 버튼 클릭'],
      expected: '적절한 에러 메시지 (이메일 존재 여부를 노출하지 않는 것이 보안상 좋음)',
    },
    {
      id: 'AUTH-004',
      title: '빈 필드 로그인 시도',
      steps: ['이메일, 비밀번호 모두 비운 채 로그인 클릭', '이메일만 입력하고 로그인 클릭', '비밀번호만 입력하고 로그인 클릭'],
      expected: '각 경우 적절한 유효성 검사 메시지 표시',
    },
    {
      id: 'AUTH-005',
      title: '로그인 유지 (Remember Me)',
      steps: ['로그인 화면에서 "로그인 유지" 체크', '로그인 성공', '브라우저 탭 닫고 다시 접속'],
      expected: '재접속 시 자동 로그인 유지',
      pattern: '체크 해제 후 로그인 → 탭 닫고 재접속 시 로그인 화면 표시'
    },
    {
      id: 'AUTH-006',
      title: '로그아웃',
      steps: ['로그인 상태에서 프로필 탭 이동', '설정(환경설정) 진입', '로그아웃 버튼 클릭'],
      expected: '로그인 화면으로 이동, 이전 페이지 접근 불가',
    },
    {
      id: 'AUTH-007',
      title: '비밀번호 찾기 — 1단계',
      steps: ['로그인 화면 → "비밀번호 찾기" 클릭', '이름과 이메일 입력', '다음 버튼 클릭'],
      expected: '존재하는 계정이면 2단계로 이동, 없으면 에러 메시지',
      pattern: '이름은 맞고 이메일 틀린 경우 / 이메일 맞고 이름 틀린 경우'
    },
    {
      id: 'AUTH-008',
      title: '비밀번호 찾기 — 2~3단계',
      steps: ['1단계 통과 후 생년월일 + 보안질문 답변 입력', '올바른 답변 입력 → 3단계 진입', '새 비밀번호 입력 (8자 이상) + 확인', '변경 완료 후 새 비밀번호로 로그인'],
      expected: '비밀번호 변경 성공, 새 비밀번호로 로그인 가능',
      pattern: '잘못된 생년월일 입력 / 보안질문 오답 입력 시 에러 확인'
    },
    {
      id: 'AUTH-009',
      title: '토큰 만료 시 동작',
      steps: ['로그인 후 개발자 도구(F12)로 localStorage의 token 삭제', '아무 페이지 이동 시도'],
      expected: '로그인 화면으로 리다이렉트',
    },
    {
      id: 'AUTH-010',
      title: 'SQL 인젝션 방어 테스트',
      steps: ["이메일 필드에 ' OR 1=1 -- 입력", "비밀번호에 ' OR 1=1 -- 입력", '로그인 시도'],
      expected: '로그인 실패, 에러 메시지 표시 (SQL 에러 노출 없어야 함)',
      pattern: "이메일에 \"; DROP TABLE members;-- 입력"
    },
  ]
},

// ──────────────────────────────────────────────────
// 2. 회원가입
// ──────────────────────────────────────────────────
{
  id: 'signup',
  icon: '📝',
  title: '회원가입',
  tests: [
    {
      id: 'SIGNUP-001',
      title: '회원가입 전체 흐름',
      steps: ['로그인 화면 → "회원가입" 버튼 클릭', '조직(로컬) 선택', '기본 정보 입력: 이름, 이메일, 전화번호, 생년월일', '비밀번호 설정 (8자 이상)', '프로필 사진 업로드 (선택)', '직장 정보 입력: 회사명, 직책, 부서, 회사전화', '업종 카테고리 선택', 'SNS 링크 입력 (선택)', '가입 완료 버튼'],
      expected: '가입 완료 메시지, "승인 대기 중" 안내 표시',
    },
    {
      id: 'SIGNUP-002',
      title: '이메일 중복 체크',
      steps: ['회원가입 진행', '이미 가입된 이메일 입력 (예: admin@jc.com)', '다음 단계 진행 시도'],
      expected: '이메일 중복 에러 메시지 표시, 진행 차단',
    },
    {
      id: 'SIGNUP-003',
      title: '필수 입력값 검증',
      steps: ['이름 비우고 다음 시도', '이메일 형식 잘못 입력 (예: abc, abc@, @test.com)', '전화번호 형식 틀리게 입력', '비밀번호 7자 이하 입력'],
      expected: '각 필드마다 명확한 에러 메시지 인라인 표시',
      pattern: '한 글자씩 입력하며 실시간 유효성 검사 확인'
    },
    {
      id: 'SIGNUP-004',
      title: '프로필 사진 업로드 & 크롭',
      steps: ['사진 업로드 버튼 클릭', '갤러리에서 이미지 선택', '크롭 영역 조정', '확인 버튼'],
      expected: '미리보기에 크롭된 사진 표시',
      pattern: '매우 큰 이미지(10MB+) / 매우 작은 이미지 / 지원 안 되는 형식(gif, bmp)'
    },
    {
      id: 'SIGNUP-005',
      title: 'SNS 링크 유효성',
      steps: ['인스타그램 필드에 URL이 아닌 텍스트 입력', '유튜브 필드에 올바른 URL 입력', '블로그 필드에 한글 URL 입력'],
      expected: '잘못된 형식에 경고 또는 자동 보정',
    },
  ]
},

// ──────────────────────────────────────────────────
// 3. 홈 화면
// ──────────────────────────────────────────────────
{
  id: 'home',
  icon: '🏠',
  title: '홈 화면',
  tests: [
    {
      id: 'HOME-001',
      title: '홈 화면 로딩',
      steps: ['로그인 성공 후 홈 화면 도달', '조직명, 공지사항 요약, 일정 요약, 배너 확인'],
      expected: '모든 영역이 데이터와 함께 정상 로딩',
    },

// ═══════════════════════════════════════════════════
// 앱 상태 관리
// ═══════════════════════════════════════════════════
let testResults = {};
let allCollapsed = false;

function initApp() {
  loadFromStorage();
  renderTests();
  updateStats();
  populateFilterSection();
}

function loadFromStorage() {
  try {
    const saved = localStorage.getItem('jc-qa-results-v2');
    if (saved) testResults = JSON.parse(saved);
  } catch(e) {}
}

function saveToStorage() {
  localStorage.setItem('jc-qa-results-v2', JSON.stringify(testResults));
}

function getResult(id) {
  if (!testResults[id]) testResults[id] = { status: 'none', issue: '', severity: '', screenshots: [] };
  return testResults[id];
}

// ═══════════════════════════════════════════════════
// 렌더링
// ═══════════════════════════════════════════════════
function renderTests() {
  const container = document.getElementById('testContainer');
  container.innerHTML = '';

  TEST_DATA.forEach(section => {
    const sectionEl = document.createElement('div');
    sectionEl.className = 'section';
    sectionEl.dataset.sectionId = section.id;

    // 실패 카운트
    const failCount = section.tests.filter(t => getResult(t.id).status === 'fail').length;
    const doneCount = section.tests.filter(t => getResult(t.id).status !== 'none').length;

    sectionEl.innerHTML = `
      <div class="section-header" onclick="toggleSection('${section.id}')">
        <div class="section-title">
          <span class="section-icon">${section.icon}</span>
          ${section.title}
          <span class="section-badge ${failCount > 0 ? 'has-fail' : ''}">${doneCount}/${section.tests.length}${failCount > 0 ? ' | 🐛' + failCount : ''}</span>
        </div>
        <span class="section-toggle" id="toggle-${section.id}">▼</span>
      </div>
      <div class="section-body" id="body-${section.id}">
        ${section.tests.map((t, i) => renderTestItem(t, i + 1)).join('')}
      </div>
    `;
    container.appendChild(sectionEl);
  });
}

function renderTestItem(test, num) {
  const result = getResult(test.id);
  const statusClass = result.status !== 'none' ? `status-${result.status}` : '';

  return `
    <div class="test-item ${statusClass}" id="item-${test.id}" data-test-id="${test.id}">
      <div class="test-row">
        <div class="test-number">${test.id}</div>
        <div class="test-content">
          <div class="test-title">${test.title}</div>
          <ol class="test-steps">
            ${test.steps.map(s => `<li>${s}</li>`).join('')}
          </ol>
          <div class="test-expected">✅ 예상 결과: ${test.expected}</div>
          ${test.pattern ? `<div class="test-pattern">${test.pattern}</div>` : ''}

          <div class="test-actions">
            <button class="test-btn btn-pass ${result.status === 'pass' ? 'active' : ''}" onclick="setStatus('${test.id}','pass')">✅ 통과</button>
            <button class="test-btn btn-fail ${result.status === 'fail' ? 'active' : ''}" onclick="setStatus('${test.id}','fail')">❌ 실패</button>
            <button class="test-btn btn-skip ${result.status === 'skip' ? 'active' : ''}" onclick="setStatus('${test.id}','skip')">⏭ 건너뜀</button>
          </div>

          <div class="issue-area ${result.status === 'fail' ? 'visible' : ''}" id="issue-${test.id}">
            <textarea class="issue-textarea" placeholder="발견된 문제를 상세히 적어주세요...&#10;예: 어떤 화면에서, 어떤 조작을 했을 때, 어떤 결과가 나왔는지"
              oninput="updateIssue('${test.id}', this.value)">${result.issue || ''}</textarea>
            <div class="issue-severity">
              <span style="font-size:12px;color:#6b7280;">심각도:</span>
              <button class="severity-btn sev-critical ${result.severity === 'critical' ? 'active' : ''}" onclick="setSeverity('${test.id}','critical')">🔴 치명적</button>
              <button class="severity-btn sev-major ${result.severity === 'major' ? 'active' : ''}" onclick="setSeverity('${test.id}','major')">🟡 주요</button>
              <button class="severity-btn sev-minor ${result.severity === 'minor' ? 'active' : ''}" onclick="setSeverity('${test.id}','minor')">🔵 경미</button>
              <button class="severity-btn sev-cosmetic ${result.severity === 'cosmetic' ? 'active' : ''}" onclick="setSeverity('${test.id}','cosmetic')">🟣 외관</button>
            </div>
            <div class="screenshot-area">
              <label class="screenshot-btn" for="file-${test.id}">
                📷 스크린샷 첨부
                <input type="file" id="file-${test.id}" accept="image/*" multiple style="display:none" onchange="addScreenshots('${test.id}', this)">
              </label>
              <span style="font-size:11px;color:#9ca3af;margin-left:8px;">또는 Ctrl+V로 클립보드 붙여넣기</span>
              <div class="screenshot-preview" id="preview-${test.id}">
                ${(result.screenshots || []).map((s, i) => `
                  <div class="screenshot-thumb" onclick="openLightbox('${s}')">
                    <img src="${s}" alt="screenshot">
                    <button class="screenshot-remove" onclick="event.stopPropagation();removeScreenshot('${test.id}',${i})">×</button>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════
// 상태 관리
// ═══════════════════════════════════════════════════
function setStatus(id, status) {
  const result = getResult(id);
  result.status = result.status === status ? 'none' : status;
  saveToStorage();
  renderTests();
  updateStats();
  applyFilter();
}

function updateIssue(id, text) {
  getResult(id).issue = text;
  saveToStorage();
}

function setSeverity(id, sev) {
  const result = getResult(id);
  result.severity = result.severity === sev ? '' : sev;
  saveToStorage();
  // Update UI without full re-render
  document.querySelectorAll(`#issue-${id} .severity-btn`).forEach(btn => btn.classList.remove('active'));
  if (result.severity) {
    document.querySelector(`#issue-${id} .sev-${result.severity}`)?.classList.add('active');
  }
}

// ═══════════════════════════════════════════════════
// 스크린샷
// ═══════════════════════════════════════════════════
function addScreenshots(id, input) {
  const result = getResult(id);
  if (!result.screenshots) result.screenshots = [];

  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      result.screenshots.push(e.target.result);
      saveToStorage();
      renderScreenshots(id);
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function removeScreenshot(id, index) {
  const result = getResult(id);
  result.screenshots.splice(index, 1);
  saveToStorage();
  renderScreenshots(id);
}

function renderScreenshots(id) {
  const result = getResult(id);
  const preview = document.getElementById(`preview-${id}`);
  if (!preview) return;
  preview.innerHTML = (result.screenshots || []).map((s, i) => `
    <div class="screenshot-thumb" onclick="openLightbox('${s}')">
      <img src="${s}" alt="screenshot">
      <button class="screenshot-remove" onclick="event.stopPropagation();removeScreenshot('${id}',${i})">×</button>
    </div>
  `).join('');
}

// Ctrl+V 클립보드 붙여넣기
document.addEventListener('paste', (e) => {
  const activeIssue = document.querySelector('.issue-area.visible .issue-textarea:focus');
  if (!activeIssue) return;

  const testId = activeIssue.closest('.test-item')?.dataset.testId;
  if (!testId) return;

  const items = e.clipboardData?.items;
  if (!items) return;

  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = (ev) => {
        const result = getResult(testId);
        if (!result.screenshots) result.screenshots = [];
        result.screenshots.push(ev.target.result);
        saveToStorage();
        renderScreenshots(testId);
      };
      reader.readAsDataURL(file);
    }
  }
});

// ═══════════════════════════════════════════════════
// 라이트박스
// ═══════════════════════════════════════════════════
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

// ═══════════════════════════════════════════════════
// 통계
// ═══════════════════════════════════════════════════
function updateStats() {
  let total = 0, pass = 0, fail = 0, skip = 0, issues = 0;
  TEST_DATA.forEach(s => s.tests.forEach(t => {
    total++;
    const r = getResult(t.id);
    if (r.status === 'pass') pass++;
    if (r.status === 'fail') fail++;
    if (r.status === 'skip') skip++;
    if (r.issue) issues++;
  }));

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPass').textContent = pass;
  document.getElementById('statFail').textContent = fail;
  document.getElementById('statSkip').textContent = skip;
  document.getElementById('statIssue').textContent = issues;

  const done = pass + fail + skip;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `테스트 진행률: ${done}/${total} (${pct}%)`;
}

// ═══════════════════════════════════════════════════
// 필터
// ═══════════════════════════════════════════════════
function populateFilterSection() {
  const sel = document.getElementById('filterSection');
  TEST_DATA.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = `${s.icon} ${s.title}`;
    sel.appendChild(opt);
  });
}

function applyFilter() {
  const section = document.getElementById('filterSection').value;
  const status = document.getElementById('filterStatus').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();

  document.querySelectorAll('.section').forEach(el => {
    const sid = el.dataset.sectionId;
    if (section !== 'all' && sid !== section) { el.style.display = 'none'; return; }
    el.style.display = '';
  });

  document.querySelectorAll('.test-item').forEach(el => {
    const tid = el.dataset.testId;
    const r = getResult(tid);
    let show = true;

    if (status !== 'all' && r.status !== status) show = false;
    if (search) {
      const text = el.textContent.toLowerCase();
      if (!text.includes(search)) show = false;
    }

    el.style.display = show ? '' : 'none';
  });
}

// ═══════════════════════════════════════════════════
// 섹션 토글
// ═══════════════════════════════════════════════════
function toggleSection(id) {
  const body = document.getElementById(`body-${id}`);
  const toggle = document.getElementById(`toggle-${id}`);
  body.classList.toggle('collapsed');
  toggle.classList.toggle('collapsed');
}

function toggleAllSections() {
  allCollapsed = !allCollapsed;
  TEST_DATA.forEach(s => {
    const body = document.getElementById(`body-${s.id}`);
    const toggle = document.getElementById(`toggle-${s.id}`);
    if (allCollapsed) {
      body.classList.add('collapsed');
      toggle.classList.add('collapsed');
    } else {
      body.classList.remove('collapsed');
      toggle.classList.remove('collapsed');
    }
  });
}

// ═══════════════════════════════════════════════════
// 저장 & 내보내기
// ═══════════════════════════════════════════════════
function saveResults() {
  const now = new Date();
  const timestamp = now.toISOString().slice(0,19).replace(/[T:]/g, '-');
  const filename = `qa-result-${timestamp}.json`;

  const data = {
    version: '2.0',
    app: 'JC 회원관리 커뮤니티 앱',
    tester: '사장님',
    timestamp: now.toISOString(),
    date: now.toLocaleDateString('ko-KR'),
    summary: getSummaryData(),
    results: {},
    issues: []
  };

  TEST_DATA.forEach(section => {
    section.tests.forEach(test => {
      const r = getResult(test.id);
      data.results[test.id] = {
        section: section.title,
        title: test.title,
        status: r.status,
        issue: r.issue || null,
        severity: r.severity || null,
        screenshotCount: (r.screenshots || []).length
      };
      if (r.status === 'fail' && r.issue) {
        data.issues.push({
          id: test.id,
          section: section.title,
          title: test.title,
          severity: r.severity || 'unknown',
          description: r.issue,
          screenshotCount: (r.screenshots || []).length
        });
      }
    });
  });

  // 다운로드
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);

  showToast(`저장 완료: ${filename}`, 'success');
  showToast('파일을 Docs/qa-results/ 폴더에 넣으면 Claude AI가 읽을 수 있습니다', 'info');
}

function getSummaryData() {
  let total = 0, pass = 0, fail = 0, skip = 0;
  TEST_DATA.forEach(s => s.tests.forEach(t => {
    total++;
    const r = getResult(t.id);
    if (r.status === 'pass') pass++;
    if (r.status === 'fail') fail++;
    if (r.status === 'skip') skip++;
  }));
  return { total, pass, fail, skip, untested: total - pass - fail - skip, passRate: total > 0 ? Math.round(pass / total * 100) + '%' : '0%' };
}

function exportMarkdown() {
  const now = new Date();
  let md = `# JC 앱 QA 테스트 결과\n\n`;
  md += `- **테스트 일시**: ${now.toLocaleString('ko-KR')}\n`;
  md += `- **테스터**: 사장님\n`;
  const summary = getSummaryData();
  md += `- **결과**: 전체 ${summary.total} | ✅ 통과 ${summary.pass} | ❌ 실패 ${summary.fail} | ⏭ 건너뜀 ${summary.skip} | 미테스트 ${summary.untested}\n`;
  md += `- **통과율**: ${summary.passRate}\n\n`;

  // 이슈 요약
  const issues = [];
  TEST_DATA.forEach(section => {
    section.tests.forEach(test => {
      const r = getResult(test.id);
      if (r.status === 'fail' && r.issue) {
        issues.push({ id: test.id, section: section.title, title: test.title, severity: r.severity, issue: r.issue });
      }
    });
  });

  if (issues.length > 0) {
    md += `## 🐛 발견된 이슈 (${issues.length}건)\n\n`;
    const sevOrder = { critical: 0, major: 1, minor: 2, cosmetic: 3, '': 4 };
    issues.sort((a, b) => (sevOrder[a.severity] || 4) - (sevOrder[b.severity] || 4));
    issues.forEach(iss => {
      const sevLabel = { critical: '🔴 치명적', major: '🟡 주요', minor: '🔵 경미', cosmetic: '🟣 외관' }[iss.severity] || '⚪ 미분류';
      md += `### [${iss.id}] ${iss.title}\n`;
      md += `- **섹션**: ${iss.section}\n`;
      md += `- **심각도**: ${sevLabel}\n`;
      md += `- **설명**: ${iss.issue}\n\n`;
    });
  }

  // 상세 결과
  md += `## 📋 상세 결과\n\n`;
  TEST_DATA.forEach(section => {
    md += `### ${section.icon} ${section.title}\n\n`;
    md += `| ID | 테스트 | 결과 | 비고 |\n`;
    md += `|----|--------|------|------|\n`;
    section.tests.forEach(test => {
      const r = getResult(test.id);
      const statusLabel = { pass: '✅ 통과', fail: '❌ 실패', skip: '⏭ 건너뜀', none: '⬜ 미테스트' }[r.status] || '⬜ 미테스트';
      const note = r.issue ? r.issue.substring(0, 50) + (r.issue.length > 50 ? '...' : '') : '-';
      md += `| ${test.id} | ${test.title} | ${statusLabel} | ${note} |\n`;
    });
    md += '\n';
  });

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `JC-QA-결과-${now.toISOString().slice(0,10)}.md`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('마크다운 내보내기 완료!', 'success');
}

function loadResults() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.results) {
          Object.entries(data.results).forEach(([id, r]) => {
            testResults[id] = {
              status: r.status || 'none',
              issue: r.issue || '',
              severity: r.severity || '',
              screenshots: testResults[id]?.screenshots || []
            };
          });
          saveToStorage();
          renderTests();
          updateStats();
          showToast('이전 결과 불러오기 완료!', 'success');
        }
      } catch(err) {
        showToast('파일 형식 오류', 'error');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ═══════════════════════════════════════════════════
// 이슈 요약 패널
// ═══════════════════════════════════════════════════
function showIssueSummary() {
  const container = document.getElementById('testContainer');
  const existing = document.getElementById('issueSummaryPanel');
  if (existing) { existing.remove(); return; }

  const issues = [];
  TEST_DATA.forEach(section => {
    section.tests.forEach(test => {
      const r = getResult(test.id);
      if (r.status === 'fail') {
        issues.push({ id: test.id, section: section.title, title: test.title, severity: r.severity || 'unknown', issue: r.issue });
      }
    });
  });

  const panel = document.createElement('div');
  panel.id = 'issueSummaryPanel';
  panel.className = 'summary-panel';

  if (issues.length === 0) {
    panel.innerHTML = `<div class="summary-title">🐛 이슈 요약</div><p style="color:#6b7280;font-size:14px;">발견된 이슈가 없습니다! 🎉</p>`;
  } else {
    const sevOrder = { critical: 0, major: 1, minor: 2, cosmetic: 3, unknown: 4 };
    issues.sort((a, b) => (sevOrder[a.severity] || 4) - (sevOrder[b.severity] || 4));

    panel.innerHTML = `
      <div class="summary-title">🐛 이슈 요약 (${issues.length}건)</div>
      ${issues.map(iss => `
        <div class="issue-list-item ${iss.severity}">
          <strong>[${iss.id}]</strong>
          <div>
            <div><strong>${iss.title}</strong> <span style="font-size:11px;color:#6b7280;">(${iss.section})</span></div>
            ${iss.issue ? `<div style="font-size:12px;margin-top:2px;">${iss.issue}</div>` : '<div style="font-size:12px;color:#9ca3af;margin-top:2px;">설명 미입력</div>'}
          </div>
        </div>
      `).join('')}
    `;
  }

  container.insertBefore(panel, container.firstChild);
}

// ═══════════════════════════════════════════════════
// 유틸리티
// ═══════════════════════════════════════════════════
function showToast(msg, type = 'info') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${type} visible`;
  setTimeout(() => toast.classList.remove('visible'), 3000);
}

function resetAll() {
  if (!confirm('모든 테스트 결과를 초기화하시겠습니까?\n(스크린샷 포함 모든 데이터가 삭제됩니다)')) return;
  testResults = {};
  localStorage.removeItem('jc-qa-results-v2');
  renderTests();
  updateStats();
  showToast('초기화 완료', 'info');
}

// 초기화
window.addEventListener('DOMContentLoaded', initApp);
</script>
