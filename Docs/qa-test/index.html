<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JC 앱 QA 테스트</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: #F3F4F6; color: #1F2937; line-height: 1.6; }
.header { background: #2563EB; color: #fff; padding: 20px 24px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.header h1 { font-size: 20px; font-weight: 700; }
.header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
.stats-bar { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
.stat { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.stat.pass { background: #16A34A; }
.stat.fail { background: #DC2626; }
.stat.pending { background: rgba(255,255,255,0.2); }
.controls { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.controls button { padding: 6px 14px; border: 1px solid rgba(255,255,255,0.4); background: transparent; color: #fff; border-radius: 6px; cursor: pointer; font-size: 12px; }
.controls button:hover { background: rgba(255,255,255,0.15); }
.controls button.active { background: rgba(255,255,255,0.3); border-color: #fff; }

.container { max-width: 900px; margin: 0 auto; padding: 16px; }

.category { margin-bottom: 24px; }
.category-header { background: #fff; padding: 14px 18px; border-radius: 12px 12px 0 0; border-bottom: 2px solid #2563EB; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.category-header h2 { font-size: 16px; color: #1F2937; display: flex; align-items: center; gap: 8px; }
.category-header .cat-icon { font-size: 20px; }
.category-header .cat-stats { font-size: 12px; color: #6B7280; }
.category-header .toggle { font-size: 18px; color: #9CA3AF; transition: transform 0.2s; }
.category.collapsed .toggle { transform: rotate(-90deg); }
.category.collapsed .category-body { display: none; }

.scenario { background: #fff; border-bottom: 1px solid #F3F4F6; }
.scenario-header { padding: 12px 18px; background: #F9FAFB; border-bottom: 1px solid #E5E7EB; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
.scenario-header h3 { font-size: 14px; color: #374151; }
.scenario-header .scenario-desc { font-size: 12px; color: #9CA3AF; margin-top: 2px; }
.scenario.collapsed .scenario-body { display: none; }

.step { display: flex; align-items: flex-start; padding: 10px 18px; border-bottom: 1px solid #F9FAFB; gap: 10px; transition: background 0.15s; }
.step:hover { background: #FAFBFC; }
.step.pass { background: #F0FDF4; }
.step.fail { background: #FEF2F2; }

.step-num { min-width: 28px; height: 28px; border-radius: 50%; background: #E5E7EB; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #6B7280; flex-shrink: 0; }
.step.pass .step-num { background: #16A34A; color: #fff; }
.step.fail .step-num { background: #DC2626; color: #fff; }

.step-content { flex: 1; }
.step-text { font-size: 13px; color: #374151; }

.step-actions { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
.btn-pass, .btn-fail { width: 36px; height: 36px; border: 2px solid #D1D5DB; border-radius: 8px; background: #fff; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.btn-pass:hover { border-color: #16A34A; background: #F0FDF4; }
.btn-fail:hover { border-color: #DC2626; background: #FEF2F2; }
.step.pass .btn-pass { background: #16A34A; border-color: #16A34A; color: #fff; }
.step.fail .btn-fail { background: #DC2626; border-color: #DC2626; color: #fff; }

.issue-input { width: 100%; margin-top: 6px; padding: 8px 10px; border: 1px solid #FCA5A5; border-radius: 6px; font-size: 12px; background: #FFF7F7; resize: vertical; min-height: 36px; display: none; }
.step.fail .issue-input { display: block; }

.last-item { border-radius: 0 0 12px 12px; overflow: hidden; }

.summary-section { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
.summary-section h2 { font-size: 16px; margin-bottom: 12px; color: #1F2937; }
.issue-list { list-style: none; }
.issue-list li { padding: 10px 12px; background: #FEF2F2; border-left: 3px solid #DC2626; margin-bottom: 8px; border-radius: 0 8px 8px 0; font-size: 13px; }
.issue-list li .issue-location { font-weight: 600; color: #991B1B; }
.issue-list li .issue-text { color: #7F1D1D; margin-top: 2px; }
.no-issues { text-align: center; padding: 20px; color: #16A34A; font-size: 14px; }

.export-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #E5E7EB; padding: 12px 24px; display: flex; gap: 8px; justify-content: center; z-index: 100; box-shadow: 0 -2px 8px rgba(0,0,0,0.08); }
.export-bar button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-export { background: #2563EB; color: #fff; }
.btn-export:hover { background: #1D4ED8; }
.btn-reset { background: #F3F4F6; color: #6B7280; }
.btn-reset:hover { background: #E5E7EB; }
.btn-copy { background: #F59E0B; color: #fff; }
.btn-copy:hover { background: #D97706; }

.spacer { height: 80px; }

@media (max-width: 600px) {
  .container { padding: 8px; }
  .step { padding: 8px 12px; }
  .step-text { font-size: 12px; }
}
</style>
</head>

<div class="header">

  </div>

    <button onclick="filterSteps('pending')" data-filter="pending">미완만</button>
    <button onclick="filterSteps('fail')" data-filter="fail">실패만</button>
    <button onclick="toggleAll()" id="btn-toggle">모두 접기</button>

</div>

<div class="container" id="test-container"></div>

<div id="issue-summary"></div>

<div class="spacer"></div>

<div class="export-bar">

// State
let results = JSON.parse(localStorage.getItem('jc_qa_results') || '{}');

function getStepKey(catId, scenIdx, stepIdx) {
  return `${catId}_${scenIdx}_${stepIdx}`;
}

function getStepState(key) {
  return results[key] || { status: 'pending', issue: '' };
}

function setStepState(key, status, issue) {
  results[key] = { status, issue: issue || '' };
  localStorage.setItem('jc_qa_results', JSON.stringify(results));
  updateStats();
}

function render() {
  const container = document.getElementById('test-container');
  let html = '';

  DATA.forEach(cat => {
    html += `<div class="category" id="cat-${cat.id}">`;
    html += `<div class="category-header" onclick="toggleCategory('${cat.id}')">`;
    html += `<h2><span class="cat-icon">${cat.icon}</span> ${cat.title} <span class="cat-stats" id="cat-stats-${cat.id}"></span></h2>`;
    html += `<span class="toggle">▼</span></div>`;
    html += `<div class="category-body">`;

    cat.scenarios.forEach((scen, si) => {
      html += `<div class="scenario" id="scen-${cat.id}-${si}">`;
      html += `<div class="scenario-header" onclick="toggleScenario('${cat.id}',${si})">`;
      html += `<div><h3>${scen.title}</h3><div class="scenario-desc">${scen.desc}</div></div></div>`;
      html += `<div class="scenario-body">`;

      scen.steps.forEach((step, sti) => {
        const key = getStepKey(cat.id, si, sti);
        const state = getStepState(key);
        html += `<div class="step ${state.status}" id="step-${key}" data-key="${key}">`;
        html += `<div class="step-num">${sti + 1}</div>`;
        html += `<div class="step-content">`;
        html += `<div class="step-text">${step}</div>`;
        html += `<textarea class="issue-input" placeholder="어떤 문제가 있었는지 적어주세요..." onchange="updateIssue('${key}', this.value)">${state.issue || ''}</textarea>`;
        html += `</div>`;
        html += `<div class="step-actions">`;
        html += `<button class="btn-pass" onclick="markStep('${key}','pass')" title="통과">✓</button>`;
        html += `<button class="btn-fail" onclick="markStep('${key}','fail')" title="실패">✗</button>`;
        html += `</div></div>`;
      });

      html += `</div></div>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
  updateStats();
}

function markStep(key, status) {
  const current = getStepState(key);
  if (current.status === status) {
    setStepState(key, 'pending', current.issue);
  } else {
    setStepState(key, status, current.issue);
  }
  const el = document.getElementById('step-' + key);
  if (el) {
    el.className = 'step ' + getStepState(key).status;
  }
  updateIssueSummary();
}

function updateIssue(key, text) {
  const state = getStepState(key);
  setStepState(key, state.status, text);
  updateIssueSummary();
}

function updateStats() {
  let total = 0, pass = 0, fail = 0;
  DATA.forEach(cat => {
    let catPass = 0, catTotal = 0;
    cat.scenarios.forEach((scen, si) => {
      scen.steps.forEach((_, sti) => {
        const key = getStepKey(cat.id, si, sti);
        const state = getStepState(key);
        total++;
        catTotal++;
        if (state.status === 'pass') { pass++; catPass++; }
        if (state.status === 'fail') fail++;
      });
    });
    const catEl = document.getElementById('cat-stats-' + cat.id);
    if (catEl) catEl.textContent = `(${catPass}/${catTotal})`;
  });

  document.getElementById('stat-pass').textContent = '통과: ' + pass;
  document.getElementById('stat-fail').textContent = '실패: ' + fail;
  document.getElementById('stat-pending').textContent = '미완: ' + (total - pass - fail);
  document.getElementById('stat-progress').textContent = '진행률: ' + Math.round((pass + fail) / total * 100) + '%';
  updateIssueSummary();
}

function updateIssueSummary() {
  const el = document.getElementById('issue-summary');
  let issues = [];
  DATA.forEach(cat => {
    cat.scenarios.forEach((scen, si) => {
      scen.steps.forEach((step, sti) => {
        const key = getStepKey(cat.id, si, sti);
        const state = getStepState(key);
        if (state.status === 'fail') {
          issues.push({ cat: cat.title, scen: scen.title, step: step, issue: state.issue, stepNum: sti + 1 });
        }
      });
    });
  });

  if (issues.length === 0) {
    el.innerHTML = '<div class="container"><div class="summary-section"><div class="no-issues">발견된 문제가 없습니다</div></div></div>';
    return;
  }

  let html = '<div class="container"><div class="summary-section"><h2>발견된 문제 (' + issues.length + '건)</h2><ul class="issue-list">';
  issues.forEach(i => {
    html += '<li><div class="issue-location">[' + i.cat + '] ' + i.scen + ' - ' + i.stepNum + '단계</div>';
    html += '<div>' + i.step + '</div>';
    if (i.issue) html += '<div class="issue-text">메모: ' + i.issue + '</div>';
    html += '</li>';
  });
  html += '</ul></div></div>';
  el.innerHTML = html;
}

function toggleCategory(catId) {
  document.getElementById('cat-' + catId).classList.toggle('collapsed');
}

function toggleScenario(catId, scenIdx) {
  document.getElementById('scen-' + catId + '-' + scenIdx).classList.toggle('collapsed');
}

let allCollapsed = false;
function toggleAll() {
  allCollapsed = !allCollapsed;
  document.querySelectorAll('.category').forEach(el => {
    el.classList.toggle('collapsed', allCollapsed);
  });
  document.getElementById('btn-toggle').textContent = allCollapsed ? '모두 펼치기' : '모두 접기';
}

function filterSteps(filter) {
  document.querySelectorAll('.controls button[data-filter]').forEach(b => b.classList.remove('active'));
  document.querySelector('.controls button[data-filter="' + filter + '"]').classList.add('active');
  document.querySelectorAll('.step').forEach(el => {
    if (filter === 'all') { el.style.display = ''; return; }
    const key = el.dataset.key;
    const state = getStepState(key);
    el.style.display = state.status === filter ? '' : 'none';
  });
}

function copyResults() {
  let text = '=== JC QA 테스트 결과 ===\n날짜: ' + new Date().toLocaleDateString('ko-KR') + '\n\n';
  let total = 0, pass = 0, fail = 0;
  DATA.forEach(cat => {
    text += '\n## ' + cat.icon + ' ' + cat.title + '\n';
    cat.scenarios.forEach((scen, si) => {
      text += '\n### ' + scen.title + '\n';
      scen.steps.forEach((step, sti) => {
        const key = getStepKey(cat.id, si, sti);
        const state = getStepState(key);
        const mark = state.status === 'pass' ? '[O]' : state.status === 'fail' ? '[X]' : '[ ]';
        text += mark + ' ' + (sti+1) + '. ' + step + '\n';
        if (state.issue) text += '   → 문제: ' + state.issue + '\n';
        total++;
        if (state.status === 'pass') pass++;
        if (state.status === 'fail') fail++;
      });
    });
  });
  text += '\n\n=== 요약 ===\n통과: ' + pass + ' / 실패: ' + fail + ' / 미완: ' + (total-pass-fail) + ' / 전체: ' + total + '\n';
  navigator.clipboard.writeText(text).then(() => alert('결과가 클립보드에 복사되었습니다!'));
}

function saveToFile() {
  let text = copyResultsText();
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'JC_QA_결과_' + new Date().toISOString().substring(0,10) + '.txt';
  a.click();
}

  let text = '=== JC QA 테스트 결과 ===\n날짜: ' + new Date().toLocaleDateString('ko-KR') + '\n\n';
  let total = 0, pass = 0, fail = 0;

    text += '\n## ' + cat.icon + ' ' + cat.title + '\n';
    cat.scenarios.forEach((scen, si) => {
      text += '\n### ' + scen.title + '\n';
      scen.steps.forEach((step, sti) => {
        const key = getStepKey(cat.id, si, sti);
        const state = getStepState(key);
        const mark = state.status === 'pass' ? '[O]' : state.status === 'fail' ? '[X]' : '[ ]';
        text += mark + ' ' + (sti+1) + '. ' + step + '\n';
        if (state.issue) text += '   → 문제: ' + state.issue + '\n';
        total++;
        if (state.status === 'pass') pass++;
        if (state.status === 'fail') fail++;
      });
    });
  });
  text += '\n\n=== 요약 ===\n통과: ' + pass + ' / 실패: ' + fail + ' / 미완: ' + (total-pass-fail) + ' / 전체: ' + total + '\n';
  return text;
}

function resetAll() {
  if (!confirm('모든 테스트 결과를 초기화하시겠습니까?')) return;
  results = {};
  localStorage.removeItem('jc_qa_results');
  render();
}
