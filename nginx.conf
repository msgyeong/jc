server {
    listen 80;
    server_name _;

    # 클라이언트 최대 업로드 크기 (이미지 업로드용)
    client_max_body_size 10M;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HTML 파일 — 캐시 금지 (항상 최신 버전 제공)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # HTML은 캐시하지 않음 — 배포 즉시 반영
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # API 프록시 (Node.js로 전달) — /api, /api/ 모두 매칭
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # WebSocket 지원
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # CORS는 Express에서 처리 (nginx에서 중복 설정하지 않음)
    }

    # OPTIONS 요청은 Express CORS 미들웨어에서 처리

    # 헬스체크 엔드포인트
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Service Worker — 캐시 방지 (브라우저가 항상 최신 체크)
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # manifest.json — 짧은 캐시
    location = /manifest.json {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type "application/manifest+json";
    }

    # JS/CSS — 캐시 버스터(?v=) 사용하므로 장기 캐시 허용하되 immutable 제거
    location ~* \.(js|css)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # 이미지/폰트 — 변경 빈도 낮으므로 장기 캐시
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
    }

    # gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json application/manifest+json;
}
