<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영등포 JC 관리자</title>
    <link rel="stylesheet" href="css/admin.css?v=20260326a">
</head>
<body>
    <div id="admin-root">
        <!-- 로그인 화면 -->
        <div id="login-page" class="login-page">
            <div class="login-brand">
                <div class="login-brand-inner">
                    <div class="login-brand-logo">JC</div>
                    <h1>영등포 JC<br>관리자 콘솔</h1>
                    <p>회원 관리 · 콘텐츠 관리 · 운영 관리</p>
                    <ul class="login-brand-features">
                        <li>회원 가입 승인/거절</li>
                        <li>게시판 · 공지사항 관리</li>
                        <li>일정 관리</li>
                        <li>직책/권한 관리</li>
                    </ul>
                </div>
            </div>
            <div class="login-form-panel">
                <div class="login-form-wrap">
                    <h2>관리자 로그인</h2>
                    <p class="login-subtitle">관리자 계정으로 로그인하세요</p>
                    <form id="admin-login-form" autocomplete="off">
                        <div class="form-field">
                            <label for="admin-id">관리자 이메일</label>
                            <input type="email" id="admin-id" placeholder="admin@jc.com" required>
                        </div>
                        <div class="form-field">
                            <label for="admin-pw">비밀번호</label>
                            <input type="password" id="admin-pw" placeholder="비밀번호 입력" required>
                        </div>
                        <div class="login-error" id="login-error"></div>
                        <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                            <span class="btn-text">로그인</span>
                        </button>
                    </form>
                    <a href="/" class="login-back-link">앱으로 돌아가기</a>
                </div>
            </div>
        </div>

        <!-- 메인 레이아웃 (로그인 후) -->
        <div id="main-layout" class="main-layout" style="display:none">
            <!-- 사이드바 -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-brand">
                    <div class="sidebar-logo">JC</div>
                    <span>한국JC 총관리자</span>
                </div>
                <nav class="sidebar-nav">
                    <a href="#dashboard" class="nav-link active" data-page="dashboard">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                        대시보드
                    </a>
                    <a href="#organizations" class="nav-link" data-page="organizations">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                        로컬 관리
                    </a>
                    <div class="nav-divider"></div>
                    <div id="org-sub-nav" style="display:none">
                        <div class="nav-sub-label" id="org-sub-label" style="padding:8px 16px;font-size:11px;color:#9CA3AF;text-transform:uppercase">로컬 선택됨</div>
                        <a href="#members" class="nav-link" data-page="members">
                            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                            회원 관리
                        </a>
                        <a href="#posts" class="nav-link" data-page="posts">
                            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            게시판 관리
                        </a>
                        <a href="#notices" class="nav-link" data-page="notices">
                            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                            공지사항
                        </a>
                        <a href="#schedules" class="nav-link" data-page="schedules">
                            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            일정 관리
                        </a>
                        <a href="#stats" class="nav-link" data-page="stats">
                            <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                            통계
                        </a>
                        <div class="nav-divider"></div>
                    </div>
                    <a href="#banners" class="nav-link" data-page="banners">
                        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                        배너 광고
                    </a>
                    <a href="#audit-log" class="nav-link" data-page="audit-log">
                        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                        감사 로그
                    </a>
                    <a href="#settings" class="nav-link" data-page="settings">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        설정
                    </a>
                </nav>
                <div class="sidebar-footer">
                    <div class="sidebar-user" onclick="navigateAdmin('admin-profile')" style="cursor:pointer">
                        <div class="sidebar-avatar" id="sidebar-avatar">A</div>
                        <div class="sidebar-user-info">
                            <div class="sidebar-user-name" id="sidebar-user-name">관리자</div>
                            <div class="sidebar-user-role">Super Admin</div>
                        </div>
                    </div>
                    <div class="sidebar-actions">
                        <a href="/" class="sidebar-action-link">앱으로 이동</a>
                        <button class="sidebar-action-link" onclick="adminLogout()">로그아웃</button>
                    </div>
                </div>
            </aside>

            <!-- 헤더 -->
            <header class="header" id="header">
                <button class="header-menu-btn" id="menu-toggle" aria-label="메뉴">
                    <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 class="header-title" id="header-title">대시보드</h1>
                <div class="header-right">
                    <a href="#admin-profile" class="header-user-link" id="header-user" onclick="navigateAdmin('admin-profile')">관리자</a>
                </div>
            </header>

            <!-- 메인 콘텐츠 -->
            <main class="main-content" id="main-content">
            </main>
        </div>
    </div>

    <!-- 모달 컨테이너 -->
    <div id="modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()"></div>

    <script src="js/admin-app.js?v=20260326a"></script>
    <script src="js/dashboard.js?v=20260326a"></script>
    <script src="js/members.js?v=20260326a"></script>
    <script src="js/posts.js?v=20260326a"></script>
    <script src="js/schedules.js?v=20260326a"></script>
    <script src="js/notices.js?v=20260326a"></script>
    <script src="js/stats.js?v=20260326a"></script>
    <script src="js/audit-log.js?v=20260326a"></script>
    <script src="js/settings.js?v=20260326a"></script>
    <script src="js/admin-profile.js?v=20260326a"></script>
    <script src="js/member-dossier.js?v=20260326a"></script>
    <script src="js/banners.js?v=20260326a"></script>
    <script src="js/organizations.js?v=20260326a"></script>
</body>
</html>
